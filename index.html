<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHP + MySQL 學習中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366F1;
            --secondary-color: #EC4899;
            --accent-color: #14B8A6;
            --register-color: #FF5722; /* 新增：註冊專屬橘紅色 */
            --light-bg: #F8FAFC;
            --dark-text: #1E293B;
            --light-text: #64748B;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
            min-height: 100vh;
            color: var(--dark-text);
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 頂部裝飾 */
        .top-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        body {
            padding-top: 80px;
        }

        /* Header 樣式 */
        .main-header {
            text-align: center;
            color: white;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        .main-header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            background: linear-gradient(120deg, #FFFFFF 0%, #E0E7FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .main-header .subtitle {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .main-header .description {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* 卡片網格 - 自動適應 4 張卡片排版 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        /* 卡片樣式 */
        .card {
            background: white;
            border: none;
            padding: 35px;
            border-radius: var(--border-radius);
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .card:hover::before {
            left: 100%;
        }

        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            display: block;
            animation: bounce 0.6s ease-out;
        }

        .card h3 {
            margin: 15px 0 10px 0;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .card p {
            margin: 0;
            color: var(--light-text);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* 各卡片個別頂部邊框與文字顏色設定 */
        .card:nth-child(1) {
            border-top: 4px solid var(--primary-color);
        }
        .card:nth-child(1) h3 { color: var(--primary-color); }

        .card:nth-child(2) {
            border-top: 4px solid var(--secondary-color);
        }
        .card:nth-child(2) h3 { color: var(--secondary-color); }

        .card:nth-child(3) {
            border-top: 4px solid var(--accent-color);
        }
        .card:nth-child(3) h3 { color: var(--accent-color); }

        /* 新增：第 4 張卡片（會員註冊）的樣式與文字色彩 */
        .card:nth-child(4) {
            border-top: 4px solid var(--register-color);
        }
        .card:nth-child(4) h3 { color: var(--register-color); }

        /* 滑鼠懸停背景微調 */
        .card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
        }

        .card:nth-child(1):hover {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(99, 102, 241, 0.02) 100%);
        }

        .card:nth-child(2):hover {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.05) 0%, rgba(236, 72, 153, 0.02) 100%);
        }

        .card:nth-child(3):hover {
            background: linear-gradient(135deg, rgba(20, 184, 166, 0.05) 0%, rgba(20, 184, 166, 0.02) 100%);
        }

        .card:nth-child(4):hover {
            background: linear-gradient(135deg, rgba(255, 87, 34, 0.05) 0%, rgba(255, 87, 34, 0.02) 100%);
        }

        /* 動畫效果 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: slideInUp 0.6s ease-out;
            animation-fill-mode: both;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; } /* 新增：註冊卡片的載入延遲 */

        /* 響應式設計 */
        @media (max-width: 768px) {
            .main-header h1 { font-size: 2.5rem; }
            .main-header .subtitle { font-size: 1.1rem; }
            .card-grid { grid-template-columns: 1fr; gap: 20px; }
            .card { padding: 25px; }
            .card-icon { font-size: 2.5rem; }
            .card h3 { font-size: 1.2rem; }
        }

        @media (max-width: 480px) {
            .container { padding: 20px 15px; }
            .main-header h1 { font-size: 2rem; }
            .main-header .subtitle { font-size: 1rem; }
            .card-icon { font-size: 2rem; }
            .card h3 { font-size: 1rem; }
            .card p { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="top-decoration"></div>
    
    <div class="container">
        <header class="main-header">
            <h1>🚀 PHP + MySQL 學習中心</h1>
            <p class="subtitle">揚帆起航，開啟程式學習之旅</p>
            <p class="description">系統化學習 PHP 與資料庫基礎，從零開始掌握後端開發技能</p>
        </header>
        
        <div class="card-grid">
            <a href="01-pdo.php" class="card">
                <span class="card-icon">💾</span>
                <h3>PDO 資料庫連線</h3>
                <p>學習使用 PDO 進行安全的資料庫操作，掌握預存陳述式防止 SQL 注入</p>
            </a>
            
            <!-- 新增：會員註冊卡片 -->
            <a href="02-register.php" class="card">
                <span class="card-icon">📝</span>
                <h3>會員註冊</h3>
                <p>設計清新簡約的表單介面，練習將使用者輸入的帳密與資料安全存入 members 資料表</p>
            </a>
            
            <a href="#" class="card">
                <span class="card-icon">⚙️</span>
                <h3>字串與資料處理</h3>
                <p>深入理解字串取代、分割、組合與子字串取用等核心操作</p>
            </a>
            
            <a href="#" class="card">
                <span class="card-icon">📊</span>
                <h3>課程練習集錦</h3>
                <p>精心設計的習題和項目，幫助您融會貫通所學知識</p>
            </a>
        </div>
    </div>
</body>
</html>
